name: Daily AI News Fetch

on:
  schedule:
    # 每天 UTC 0 点运行 (北京时间 8 点)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        pip install -r requirements.txt
    
    - name: 运行抓取脚本
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        MIN_SCORE: ${{ vars.MIN_SCORE || 7 }}
        MAX_ENTRIES_PER_FEED: ${{ vars.MAX_ENTRIES_PER_FEED || 5 }}
      run: |
        echo "=== 开始执行 ==="
        echo "Python 版本："
        python --version
        echo ""
        echo "当前目录："
        ls -la
        echo ""
        echo "=== 运行脚本 ==="
        python src/main.py 2>&1
        echo ""
        echo "=== 执行完成 ==="
